name: "rag-kb"

networks:
  rag-kb-net:
    name: rag-kb-net

services:
  db:
    image: postgres:16-alpine
    container_name: rag-kb-db
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWD}
      POSTGRES_DB: ${PG_DBNAME}
    ports:
      - "18433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      start_period: 3s
      interval: 1s
      timeout: 3s
      retries: 10
    networks:
      - rag-kb-net
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-kb-redis
    ports:
      - "16379:6379"
    networks:
      - rag-kb-net
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: rag-kb-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    networks:
      - rag-kb-net
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  n8n:
    build:
      context: .
      dockerfile: n8n.Dockerfile
    container_name: rag-kb-n8n
    ports:
      - "5678:5678"
    networks:
      - rag-kb-net
    env_file: ../.env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${PG_DBNAME}
      - DB_POSTGRESDB_USER=${PG_USER}
      - DB_POSTGRESDB_PASSWORD=${PG_PASSWD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=pg,pdf-parse,mammoth,xlsx,officeparser
      - N8N_RUNNERS_MODE=internal
      - N8N_RUNNERS_ALLOW_EXTERNAL_MODULES=pg,pdf-parse,mammoth,xlsx,officeparser
      - GIGACHAT_CLIENT_ID=${GIGACHAT_CLIENT_ID}
      - GIGACHAT_CLIENT_SECRET=${GIGACHAT_CLIENT_SECRET}
      - YC_API_KEY=${YC_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - APP_PG_HOST=db
      - APP_PG_PORT=5432
      - APP_PG_USER=${PG_USER}
      - APP_PG_PASSWORD=${PG_PASSWD}
      - APP_PG_DATABASE=${PG_DBNAME}_app
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  max_bot:
    image: ${DEPLOY_IMAGE_MAX_BOT:-rag-kb-max-bot:latest}
    container_name: rag-kb-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWD}@db:5432/${PG_DBNAME}_app
      N8N_WEBHOOK_BASE_URL: http://n8n:5678/webhook
    restart: unless-stopped
    networks:
      - rag-kb-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    profiles:
      - deploy

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  n8n_data:
